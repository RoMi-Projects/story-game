name: Tests

# Run the regression suite on every pull request and on every push to main, so
# a change that breaks the quest, inventory, fonts, or popups blocks the merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  godot-tests:
    name: Godot headless tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.7-stable"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          archive="Godot_v${GODOT_VERSION}_linux.x86_64"
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${archive}.zip"
          wget -q "$url"
          unzip -q "${archive}.zip"
          sudo mv "$archive" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import assets
        run: godot --headless --import

      - name: Run regression suite
        run: godot --headless --script res://tests/run_tests.gd

      - name: Smoke-boot the game
        run: |
          output=$(godot --headless --quit-after 120 2>&1) || true
          echo "$output"
          if echo "$output" | grep -E "SCRIPT ERROR|Parse Error|Failed to (load|instantiate)"; then
            echo "::error::The game produced load/script errors while booting."
            exit 1
          fi
